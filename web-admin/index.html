<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotroBus - Admin</title>
    
    <script>
        if (!localStorage.getItem('access_token')) {
            window.location.href = 'login.html';
        }
    </script>
    
    <script>
    fetch('http://localhost:5500/api/health').then(r=>r.json()).then(data=> {
        document.body.innerHTML += `<h3>Backend: ${data.status}</h3>`;
    });
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          onerror="this.href='https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css'" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Panel Administrador PotroBus</h1>
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button id="btnCheck">Health</button>
        <button id="btnLatest">Última posición</button>
        <button id="btnHistory">Historial</button>
        <button id="btnSendGps">Enviar GPS</button>
        <button id="btnMap">Mapa</button>
    </div>

    <h2>Gestión de Unidades</h2>
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button id="btnListBuses">Ver todos los buses</button>
        <button id="btnGetBus">Buscar bus por ID</button>
        <button id="btnCreateBus">Crear bus</button>
        <button id="btnUpdateBus">Actualizar bus</button>
        <button id="btnDeleteBus">Desactivar bus</button>
        <button id="btnEstadoBus">Estado del bus</button>
    </div>

    <h2>Gestión de Rutas</h2>
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button id="btnListRutas">Ver todas las rutas</button>
        <button id="btnCreateRuta">Crear ruta</button>
        <button id="btnGetParadas">Ver paradas de ruta</button>
        <button id="btnAddParada">Agregar parada</button>
        <button id="btnMostrarRuta">Ver ruta en mapa</button>
    </div>

    <h2>Gestión de Choferes</h2>
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button id="btnListChoferes">Ver todos los choferes</button>
        <button id="btnCreateChofer">Crear chofer</button>
        <button id="btnUpdateChofer">Actualizar chofer</button>
        <button id="btnDeleteChofer">Desactivar chofer</button>
    </div>

    <h2>Mensajería</h2>
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button id="btnEnviarNotificacion">Enviar notificación</button>
    </div>

    <h2>Notificaciones en tiempo real</h2>
    <div id="notificaciones-panel" style="
        max-height: 200px; 
        overflow-y: auto; 
        border: 1px solid #ccc; 
        padding: 10px;
        border-radius: 8px;
        background: #f9f9f9;
    ">
        <p style="color: #999">Esperando notificaciones...</p>
    </div>
    
    <pre id="output">Listo para probar APIs...</pre>
    

    <div id="map" style="height: 500px; width: 100%; margin-top: 20px; border: 2px solid #007bff;"></div>





    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            onerror="this.src='https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js'"></script>
    

    <script>
        window.addEventListener('load', () => {
            if (typeof L === 'undefined') {
                document.getElementById('output').textContent = 'Leaflet FALLÓ carga. Revisa red.';
                console.error('Leaflet NO disponible');
            } else {
                console.log('Leaflet cargado correctamente');
            }
        });
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
