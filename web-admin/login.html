<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Potrobus Admin</title>
    <link rel="icon" type="image/png" href="imagenes/potrobus_icono.png">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <!-- Lado Izquierdo: Imagen y Mensaje -->
        <div class="login-sidebar">
            <div class="sidebar-content">
                <h1>¡Bienvenido de vuelta, Administrador!</h1>
            </div>
            <div class="sidebar-footer">
                <div class="footer-item">
                    <img src="imagenes/safety_check.png" class="footer-icon">
                    <span>Rastreo en tiempo real</span>
                </div>
                <div   div class="footer-item">
                    <img src="imagenes/notification_sound.png" class="footer-icon">
                    <span>Notificaciones inteligentes</span>
                </div>
    <div class="footer-item">
        <img src="imagenes/shield_lock.png" class="footer-icon">
        <span>Seguro y confiable</span>
    </div>
</div>
        </div>

        <div class="login-form-section">
            <img src="imagenes/potrobus_logo.png" alt="Potrobus Logo" class="logo">
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="correo" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                correo: document.getElementById('correo').value,
                password: document.getElementById('password').value
            };

            const response = await fetch('http://localhost:5500/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            if (response.ok) {
                localStorage.setItem('access_token', result.access_token);
                if (result.user) {
                    const fullname = `${result.user.nombre} ${result.user.apellido}`.trim();
                    localStorage.setItem('user_fullname', fullname);
                }
                window.location.href = 'index.html'; // Redirige automaticamente al admin ;).
            } else {
                alert(result.message);
            }
        });
    </script>
</body>
</html>
